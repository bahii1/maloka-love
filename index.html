<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Maloka ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #ff758c, #ff7eb3);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
  text-align: center;
  overflow: hidden;
}

.container {
  background: rgba(0,0,0,0.3);
  padding: 30px;
  border-radius: 20px;
  max-width: 500px;
  position: relative;
}

button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.yes { background: #4CAF50; color: white; }
.no { background: #f44336; color: white; position: absolute; }

.response {
  margin-top: 20px;
  font-size: 20px;
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h1>Hey Maloka ❤️</h1>

  <p>
    I just wanted to remind you how much you mean to me.<br><br>
    You are my peace, my happiness, and my favorite person 💖
  </p>

  <button class="yes" onclick="sayYes()">Yes ❤️</button>
  <button class="no" id="noBtn">No 😅</button>

  <div class="response" id="response">
    I knew it 😏❤️
  </div>
</div>

<!-- 🎵 YouTube autoplay (muted for mobile) -->
<iframe id="ytplayer."
  width="0" height="0"
  src="https://www.youtube.com/embed/2Vv-BfVoq4g?autoplay=1&mute=1&loop=1&playlist=2Vv-BfVoq4g"
  frameborder="0"
  allow="autoplay">
</iframe>

<script>
function sayYes() {
  document.getElementById('response').style.display = 'block';

  // 🔊 unmute after click (works on mobile)
  const player = document.getElementById("ytplayer");
  player.src = "https://www.youtube.com/embed/2Vv-BfVoq4g?autoplay=1&mute=0&loop=1&playlist=2Vv-BfVoq4g";
}

// moving button 😅
const noBtn = document.getElementById('noBtn');
noBtn.addEventListener('mouseover', () => {
  const x = Math.random() * window.innerWidth * 0.6;
  const y = Math.random() * window.innerHeight * 0.6;
  noBtn.style.left = x + 'px';
  noBtn.style.top = y + 'px';
});
</script>

</body>
</html>
